<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>اجتماع شباب المنتزه</title>

<style>
body {
    font-family: Arial;
    direction: rtl;
    background:#f5f5f5;
    margin:0;
    padding:15px;
}

h1 {
    text-align:center;
}

.container {
    background:#fff;
    padding:15px;
    border-radius:10px;
}

.search {
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

.name {
    display:flex;
    justify-content:space-between;
    padding:10px;
    border-bottom:1px solid #eee;
}

input[type="checkbox"]{
    transform:scale(1.3);
}

.btn {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    font-size:15px;
    cursor:pointer;
}

.present { background:#4CAF50;color:white; }
.absent { background:#2196F3;color:white; }
.stats { background:#9C27B0;color:white; }

.box {
    display:none;
    margin-top:15px;
    padding:10px;
    border-radius:8px;
}

.present-box { background:#e8f5e9; }
.absent-box { background:#fff3f3; }
.stats-box { background:#f3e5f5; }

</style>
</head>

<body>

<div class="container">

<h1>اجتماع شباب المنتزه</h1>

<input id="searchInput" class="search" placeholder="🔍 ابحث..." onkeyup="filterNames()">

<div id="list"></div>

<button class="btn present" onclick="showPresent()">عرض الحضور</button>
<button class="btn absent" onclick="showAbsent()">عرض الغياب</button>
<button class="btn stats" onclick="showStats()">📊 الإحصائيات</button>

<div id="presentBox" class="box present-box">
<h3>الحضور</h3>
<ul id="presentList"></ul>
</div>

<div id="absentBox" class="box absent-box">
<h3>الغياب</h3>
<ul id="absentList"></ul>
</div>

<div id="statsBox" class="box stats-box">
<h3>الإحصائيات</h3>
<ul id="statsList"></ul>
</div>

</div>

<script>

const names = [
"أميره يوسف","امين يعقوب","اميل جرجس","ايمان هارون",
"بن يعقوب","بسنت ميلاد","بولا وجدي","تيمو صبحي",
"جوفاني هاي","جوفاني هاني","جرجس سامي","جوي يوسف",
"دينا جرجس","راجي البير","رامز بطرس","راني جون",
"راني عماد","ريمون ماجد","روان ناصر","روز مجدي",
"سارة بطرس","سارة سعد","سارة طلعت","ساندرا رافت",
"ساندرا مدحت","ساندي مجدي","سامح عايد",
"صمويل رافت","صمويل سامح","صمويل ناصر",
"فادي صفوت","فادي هاني","كيرو هاني","كوكي جرس",
"لورا جميل","مارينا جمعة","مارينا سمير",
"ماريو","ماريو صاحب جوفاني","مارتن اميل",
"ماثيو مدحت","مجدي ميخائيل","مينا بشارة",
"ناير عماد","نادر فوزي","يوسف ايمن"
];

const listDiv = document.getElementById("list");

// رسم القائمة
names.forEach((name,i)=>{
    listDiv.innerHTML += `
    <div class="name" data-name="${name}">
        <span>${name}</span>
        <input type="checkbox" id="n${i}">
    </div>`;
});

// بحث
function filterNames(){
    let v = document.getElementById("searchInput").value.toLowerCase();
    document.querySelectorAll(".name").forEach(item=>{
        let name = item.dataset.name.toLowerCase();
        item.style.display = name.includes(v) ? "flex":"none";
    });
}

// إحصائيات
let stats = JSON.parse(localStorage.getItem("stats")) || {};

// عرض الحضور + تسجيل
function showPresent(){
    let ul = document.getElementById("presentList");
    ul.innerHTML="";

    names.forEach((name,i)=>{
        let checked = document.getElementById("n"+i).checked;

        if(!stats[name]) stats[name]={p:0,a:0};

        if(checked){
            ul.innerHTML += `<li>${name}</li>`;
            stats[name].p++;
        } else {
            stats[name].a++;
        }
    });

    localStorage.setItem("stats",JSON.stringify(stats));

    showBox("presentBox");
}

// عرض الغياب
function showAbsent(){
    let ul = document.getElementById("absentList");
    ul.innerHTML="";

    names.forEach((name,i)=>{
        if(!document.getElementById("n"+i).checked){
            ul.innerHTML += `<li>${name}</li>`;
        }
    });

    showBox("absentBox");
}

// عرض الإحصائيات
function showStats(){
    let ul = document.getElementById("statsList");
    ul.innerHTML="";

    for(let name in stats){
        let p = stats[name].p;
        let a = stats[name].a;
        let total = p+a;
        let percent = total ? Math.round(p/total*100):0;

        ul.innerHTML += `
        <li>
        <b>${name}</b><br>
        حضور: ${p} | غياب: ${a} | ${percent}%
        </li>`;
    }

    showBox("statsBox");
}

// إظهار box واحد
function showBox(id){
    document.querySelectorAll(".box").forEach(b=>b.style.display="none");
    document.getElementById(id).style.display="block";
}

</script>

</body>
</html>
