<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>اجتماع شباب المنتزه</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            direction: rtl;
            text-align: right;
            background-color: #f5f5f5;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .name {
            display: flex;
            justify-content: space-between;
            margin: 6px 0;
            padding: 6px;
            border-bottom: 1px solid #eee;
        }
        .btn {
            margin-top: 10px;
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }
        .save { background: #4CAF50; color: white; }
        .show { background: #2196F3; color: white; }

        .absent-box {
            margin-top: 20px;
            padding: 10px;
            background: #fff3f3;
            border-radius: 8px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>اجتماع شباب المنتزه</h1>

    <div id="list"></div>

    <button class="btn save" onclick="saveData()">💾 حفظ</button>
    <button class="btn show" onclick="showAbsent()">📋 عرض الغياب</button>

    <div class="absent-box" id="absentBox">
        <h3>الغياب:</h3>
        <ul id="absentList"></ul>
    </div>
</div>
<div id="statsBox" style="display:none; margin-top:20px;"></div>
<button onclick="loadStats()">📊 عرض الإحصائيات</button>

<script>
const names = [
"امين يعقوب","اميل جرجس","ايمان هارون",
"بسنت ميلاد","بولا وجدي",
"تيمو صبحي",
"جوفاني هاي","جوفاني هاني","جرجس سامي","جوي يوسف",
"دينا جرجس",
"راجي البير","راني جون","ريمون ماجد",
"سارة بطرس","سارة طلعت","ساندرا مدحت","سامح عايد",
"صمويل رافت","صمويل سامح",
"فادي صفوت","فادي هاني",
"كيرو هاني","كيكو نعيم",
"لورا جميل",
"مارينا جمعة","مارينا سمير","ماريو صاحب جوفاني","مارتن اميل","ماثيو مدحت","مجدي ميخائيل","مينا بشارة",
"نادر فوزي",
"يوسف ايمن"
];

// إنشاء القائمة
const listDiv = document.getElementById("list");

names.forEach((name, i) => {
    listDiv.innerHTML += `
        <div class="name">
            <span>${name}</span>
            <input type="checkbox" id="n${i}">
        </div>
    `;
});

// تحميل البيانات
window.onload = function() {
    names.forEach((_, i) => {
        if(localStorage.getItem("cb"+i) === "true"){
            document.getElementById("n"+i).checked = true;
        }
    });
}

// حفظ
function loadStats(){
    fetch("https://youthrecord2026-production.up.railway.app/stats")
    .then(res => res.json())
    .then(data => {

        let box = document.getElementById("statsBox");
        box.style.display = "block";
        box.innerHTML = "";

        data.forEach(person => {
            box.innerHTML += `
                <div style="
                    background:#f3f3f3;
                    padding:10px;
                    margin:10px 0;
                    border-radius:8px;
                ">
                    <strong>${person.name}</strong><br>
                    حضور: ${person.attendance} |
                    غياب: ${person.absence} <br>
                    النسبة: ${person.percentage}%
                </div>
            `;
        });

    })
    .catch(err => {
        alert("❌ مش قادر يجيب الداتا");
        console.log(err);
    });
}
</script>




</body>
</html>
