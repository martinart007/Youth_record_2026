<!DOCTYPE html>
<html lang="ar">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اجتماع شباب المنتزه</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            direction: rtl;
            text-align: right;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .name {
            display: flex;
            justify-content: space-between;
            margin: 6px 0;
            padding: 6px;
            border-bottom: 1px solid #eee;
        }

        .btn {
            margin-top: 10px;
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }

        .present { background: #4CAF50; color: white; }
        .absent { background: #2196F3; color: white; }

        .box {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }

        .present-box { background: #e8f5e9; }
        .absent-box { background: #fff3f3; }

        /* 🔥 التعديل هنا فقط */
        .search {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            box-sizing: border-box;   /* 👈 مهم جدًا */
        }

        .search-wrapper {
            padding: 0 20px; /* 👈 يخليه بعيد عن الحواف ويبقى في النص */
        }

    </style>
</head>
<body>

<div class="container">
    <h1>اجتماع شباب المنتزه</h1>

    <!-- 🔥 لفينا السيرش في div -->
    <div class="search-wrapper">
        <input 
            type="text" 
            id="searchInput" 
            class="search" 
            placeholder="🔍 ابحث عن اسم..."
            onkeyup="filterNames()"
        >
    </div>

    <div id="list"></div>

    <button class="btn present" onclick="showPresent()">✅ عرض الحضور</button>
    <button class="btn absent" onclick="showAbsent()">📋 عرض الغياب</button>

    <div class="box present-box" id="presentBox">
        <h3>الحضور:</h3>
        <ul id="presentList"></ul>
    </div>

    <div class="box absent-box" id="absentBox">
        <h3>الغياب:</h3>
        <ul id="absentList"></ul>
    </div>
</div>

<script>
const names = [
"أميره يوسف",
"امين يعقوب",
"اميل جرجس",
"ايمان هارون",
"بن يعقوب",
"بسنت ميلاد",
"بولا وجدي",
"تيمو صبحي",
"جوفاني هاي",
"جوفاني هاني",
"جرجس سامي",
"جوي يوسف",
"دينا جرجس",
"راجي البير",
"رامز بطرس",
"راني جون",
"راني عماد",
"ريمون ماجد",
"روان ناصر",
"روز مجدي",
"سارة بطرس",
"سارة سعد",
"سارة طلعت",
"ساندرا رافت",
"ساندرا مدحت",
"ساندي مجدي",
"سامح عايد",
"صمويل رافت",
"صمويل سامح",
"صمويل ناصر",
"فادي صفوت",
"فادي هاني",
"كيرو هاني",
"كوكي جرس",
"لورا جميل",
"مارينا جمعة",
"مارينا سمير",
"ماريو",
"ماريو صاحب جوفاني",
"مارتن اميل",
"ماثيو مدحت",
"مجدي ميخائيل",
"مينا بشارة",
"ناير عماد",
"نادر فوزي",
"يوسف ايمن"
];

// إنشاء القائمة
const listDiv = document.getElementById("list");

names.forEach((name, i) => {
    listDiv.innerHTML += `
        <div class="name" data-name="${name}">
            <span>${name}</span>
            <input type="checkbox" id="n${i}">
        </div>
    `;
});

// البحث
function filterNames(){
    const searchValue = document.getElementById("searchInput").value.toLowerCase();
    const items = document.querySelectorAll(".name");

    items.forEach(item => {
        const name = item.getAttribute("data-name").toLowerCase();

        if(name.includes(searchValue)){
            item.style.display = "flex";
        } else {
            item.style.display = "none";
        }
    });
}

// عرض الحضور
function showPresent(){
    const ul = document.getElementById("presentList");
    ul.innerHTML = "";

    names.forEach((name, i) => {
        if(document.getElementById("n"+i).checked){
            ul.innerHTML += `<li>${name}</li>`;
        }
    });

    document.getElementById("presentBox").style.display = "block";
    document.getElementById("absentBox").style.display = "none";
}

// عرض الغياب
function showAbsent(){
    const ul = document.getElementById("absentList");
    ul.innerHTML = "";

    names.forEach((name, i) => {
        if(!document.getElementById("n"+i).checked){
            ul.innerHTML += `<li>${name}</li>`;
        }
    });

    document.getElementById("absentBox").style.display = "block";
    document.getElementById("presentBox").style.display = "none";
}
</script>

</body>
</html>
